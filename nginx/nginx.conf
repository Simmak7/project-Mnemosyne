server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Gzip compression for text-based responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Use Docker's internal DNS resolver so nginx re-resolves upstream
    # hostnames on every connection. Without this, nginx caches the IP at
    # startup and returns 502 Bad Gateway after any container is rebuilt
    # (because Docker assigns a new IP to the recreated container).
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    # Upstream variables force dynamic DNS resolution on every request.
    # nginx only uses the resolver when proxy_pass receives a variable.
    set $backend  http://backend:8000;
    set $frontend http://frontend:80;

    # ---------- Backend API routes ----------
    # Auth endpoints (no prefix)
    location ~ ^/(login|register|logout|me|auth|2fa|change-password|password-requirements|check-password-strength|account-lock-status|forgot-password|verify-reset-token|reset-password|profile|sessions|email|account)(/|$) {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Feature API endpoints (prefixed)
    location ~ ^/(notes|notes-enhanced|tags|images|image|upload-image|retry-image|task-status|search|graph|buckets|collections|albums|rag|brain|mnemosyne|documents|document-collections|nexus|settings|system|models|chat-with-ai|health)(/|$) {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # FastAPI docs
    location ~ ^/(docs|openapi\.json|redoc)$ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming endpoints need special config
    location ~ ^/(rag|mnemosyne|nexus)/.*/stream {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ---------- Frontend (everything else) ----------
    # Cache static assets with content hashes from CRA build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
